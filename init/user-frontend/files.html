<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件管理</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="main-sidebar">
      <div class="brand-box">Q</div>

      <div class="main-menu">
        <div class="main-menu-item" data-page="chat.html">💬</div>
        <div class="main-menu-item" data-page="friends.html">👥</div>
        <div class="main-menu-item" data-page="favorites.html">⭐</div>
        <div class="main-menu-item" data-page="files.html">📁</div>
        <div class="main-menu-item" data-page="settings.html">⚙️</div>
      </div>
    </aside>

    <aside class="session-sidebar">
      <div class="session-top">
        <div class="session-title-row">
          <div class="session-title">文件</div>
        </div>
        <input
          type="text"
          class="search-input"
          id="fileSearchInput"
          placeholder="搜索文件"
        />
      </div>

      <div class="session-list" id="fileList"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-topbar">
        <div>
          <h2 class="chat-title">文件管理</h2>
          <p class="chat-subtitle">查看、整理和管理你的文件资源</p>
        </div>
      </header>

      <section class="message-area" id="fileDetailArea">
        <div style="color:#94a3b8;font-size:14px;">
          请选择左侧文件查看详情
        </div>
      </section>
    </main>
  </div>

  <script src="js/page-nav.js"></script>
  <script src="js/files.js"></script>
</body>
</html>
