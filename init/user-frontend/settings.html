<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系统设置</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="main-sidebar">
      <div class="brand-box">Q</div>

      <div class="main-menu">
        <div class="main-menu-item" data-page="chat.html">💬</div>
        <div class="main-menu-item" data-page="friends.html">👥</div>
        <div class="main-menu-item" data-page="favorites.html">⭐</div>
        <div class="main-menu-item" data-page="files.html">📁</div>
        <div class="main-menu-item" data-page="settings.html">⚙️</div>
      </div>
    </aside>

    <aside class="session-sidebar">
      <div class="session-top">
        <div class="session-title-row">
          <div class="session-title">设置</div>
        </div>
      </div>

      <div class="session-list" id="settingsMenuList">
        <div class="session-card active" data-setting-key="account">
          <div class="session-info">
            <div class="session-name">账号设置</div>
            <div class="session-desc">查看账号信息与基础资料</div>
          </div>
        </div>

        <div class="session-card" data-setting-key="notice">
          <div class="session-info">
            <div class="session-name">消息通知</div>
            <div class="session-desc">管理通知提醒和提示方式</div>
          </div>
        </div>

        <div class="session-card" data-setting-key="privacy">
          <div class="session-info">
            <div class="session-name">隐私设置</div>
            <div class="session-desc">管理可见范围与安全选项</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="chat-topbar">
        <div>
          <h2 class="chat-title" id="settingsTitle">账号设置</h2>
          <p class="chat-subtitle" id="settingsSubtitle">查看当前账号的基础资料与状态</p>
        </div>
      </header>

      <section class="message-area" id="settingsDetailArea">
        <div class="message-bubble-wrap" style="max-width:100%;">
          <div class="message-name">账号设置</div>
          <div class="message-bubble">
            正在加载设置内容...
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/common.js"></script>
  <script src="js/config.js"></script>
  <script src="js/page-nav.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
