<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会议管理</title>
  <link rel="stylesheet" href="css/chat.css" />
  <style>
    .meeting-tools {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .meeting-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.3);
      border-radius: 12px;
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color: white;
      border-color: transparent;
    }

    .filter-btn:hover:not(.active) {
      background: rgba(30, 41, 59, 0.4);
    }

    .meeting-create-row {
      display: none;
      gap: 10px;
      align-items: center;
    }

    .meeting-create-row .search-input {
      flex: 1;
    }

    .meeting-status-msg {
      min-height: 20px;
      font-size: 13px;
      color: #94a3b8;
      padding: 0 2px;
    }

    .meeting-detail-card {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.56);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }

    .meeting-detail-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    .meeting-detail-row:last-child {
      border-bottom: none;
    }

    .meeting-detail-label {
      color: var(--text-1);
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .meeting-detail-value {
      color: var(--text-2);
      font-size: 14px;
      text-align: right;
      line-height: 1.7;
    }

    .meeting-action-row {
      display: flex;
      gap: 14px;
      margin-top: 24px;
    }

    .meeting-action-btn {
      flex: 1;
      height: 46px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .meeting-action-btn.secondary {
      background: rgba(30, 41, 59, 0.8);
      color: var(--text-1);
    }

    .meeting-action-btn.secondary:hover {
      background: rgba(51, 65, 85, 0.95);
    }

    .meeting-action-btn.primary {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color: white;
    }

    .meeting-action-btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(99, 102, 241, 0.24);
    }

    .meeting-action-btn.danger {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
    }

    .meeting-action-btn.danger:hover {
      background: linear-gradient(135deg, #b91c1c, #991b1b);
    }

    .meeting-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .meeting-status.status-scheduled {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    .meeting-status.status-ongoing {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .meeting-status.status-completed {
      background: rgba(107, 114, 128, 0.2);
      color: #6b7280;
    }

    .meeting-status.status-cancelled {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .meeting-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      margin: 16px 0;
    }

    .stat-item {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: var(--brand-1);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-2);
    }

    .meeting-time-info {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }

    .meeting-time-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .meeting-time-row:last-child {
      margin-bottom: 0;
    }

    .time-label {
      font-weight: 600;
      color: var(--text-1);
      font-size: 14px;
    }

    .time-value {
      color: var(--text-2);
      font-size: 14px;
    }

    .meeting-participants {
      max-height: 200px;
      overflow-y: auto;
    }

    .meeting-participant-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.06);
    }

    .meeting-participant-item:last-child {
      border-bottom: none;
    }

    .participant-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .participant-info {
      flex: 1;
    }

    .participant-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }

    .participant-role {
      font-size: 12px;
      color: var(--text-2);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="main-sidebar">
      <div class="brand-box">Q</div>

      <div class="main-menu">
        <div class="main-menu-item" data-page="chat.html">💬</div>
        <div class="main-menu-item" data-page="friends.html">👥</div>
        <div class="main-menu-item" data-page="groups.html">👨‍👩‍👧‍👦</div>
        <div class="main-menu-item active" data-page="meetings.html">📅</div>
        <div class="main-menu-item" data-page="favorites.html">⭐</div>
        <div class="main-menu-item" data-page="files.html">📁</div>
        <div class="main-menu-item" data-page="settings.html">⚙️</div>
      </div>
    </aside>

    <aside class="session-sidebar">
      <div class="session-top">
        <div class="session-title-row">
          <div class="session-title">会议</div>
          <div class="session-add-btn" id="createMeetingBtn">+</div>
        </div>

        <input
          type="text"
          class="search-input"
          id="meetingSearchInput"
          placeholder="搜索会议"
        />

        <div class="meeting-tools">
          <div class="meeting-filter">
            <button class="filter-btn active" id="filterAllMeetings">全部</button>
            <button class="filter-btn" id="filterUpcoming">即将开始</button>
            <button class="filter-btn" id="filterOngoing">进行中</button>
            <button class="filter-btn" id="filterCompleted">已结束</button>
          </div>

          <div class="meeting-create-row">
            <input
              type="text"
              class="search-input"
              id="createMeetingInput"
              placeholder="输入会议主题创建会议"
            />
            <button class="session-add-btn" id="createMeetingConfirmBtn" type="button">✓</button>
          </div>

          <div class="meeting-status-msg" id="meetingStatusMsg"></div>
        </div>

        <div class="session-list" id="meetingList"></div>
      </aside>

      <main class="chat-panel">
        <header class="chat-topbar">
          <div>
            <h2 class="chat-title" id="meetingDetailTitle">会议详情</h2>
            <p class="chat-subtitle" id="meetingDetailSubtitle">请选择左侧会议查看详情</p>
          </div>
        </header>

        <section class="message-area" id="meetingDetailArea">
          <div style="color:#94a3b8;font-size:14px;">请选择左侧会议查看详情</div>
        </section>
      </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/page-nav.js"></script>
    <script src="js/meetings.js"></script>

    <script>
      // 初始化会议页面
      document.addEventListener('DOMContentLoaded', function() {
        initMeetingsPage();
      });
    </script>
</body>
</html>
