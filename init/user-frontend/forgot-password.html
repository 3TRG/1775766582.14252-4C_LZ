<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码</title>
  <link rel="stylesheet" href="css/forgot-password.css" /> <!-- 使用与登录页面相同的样式 -->
</head>
<body>
  <div class="login-shell">
    <div class="login-brand-panel">
      <div class="brand-badge">QUANTUM CHAT</div>
      <h1 class="brand-title">新一代安全通信工作台</h1>
      <p class="brand-desc">
        以更专业的视觉风格，构建找回密码、登录、注册、会话、消息与协作的一体化前端界面。
      </p>
    </div>

    <div class="login-panel">
      <div class="login-card">
        <div class="logo">Q</div>
        <h2 class="login-heading">找回密码</h2>
        <p class="subtitle">请输入您注册时的手机号或邮箱，获取验证码进行重置</p>

        <form id="forgotPasswordForm">
          <!-- 输入手机号或邮箱 -->
          <div class="form-group">
            <label for="userIdentifier">手机号或邮箱</label>
            <input
              type="text"
              id="userIdentifier"
              placeholder="请输入手机号或邮箱"
              required
            />
          </div>

          <!-- 获取验证码 -->
          <div class="form-group">
            <label for="verificationCode">验证码</label>
            <div class="code-row">
              <input
                type="text"
                id="verificationCode"
                placeholder="请输入验证码"
                maxlength="6"
                required
              />
              <button type="button" id="getCodeBtn">获取验证码</button>
            </div>
          </div>

          <button type="submit" class="login-btn">确认找回</button>
        </form>

        <p id="message" class="message"></p>

        <!-- 返回登录链接 -->
        <div class="register-link">
          <p>记得密码了吗？<a href="login.html">去登录</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script> <!-- 新的找回密码页面逻辑 -->
</body>
</html>
