<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-brand-panel">
      <div class="brand-badge">QUANTUM CHAT</div>
      <h1 class="brand-title">新一代安全通信工作台</h1>
      <p class="brand-desc">
        以更专业的视觉风格，构建登录、会话、消息与协作的一体化前端界面。
      </p>
    </div>

    <div class="login-panel">
      <div class="login-card">
        <div class="logo">Q</div>
        <h2 class="login-heading">欢迎登录</h2>
        <p class="subtitle">请输入手机号和密码进入系统</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="phone">手机号</label>
            <input
              type="text"
              id="phone"
              placeholder="请输入 11 位手机号"
              maxlength="11"
            />
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <div class="code-row">
              <input
                type="password"
                id="password"
                placeholder="请输入登录密码"
              />
            </div>
          </div>

          <div class="agree-row">
            <input type="checkbox" id="agree" />
            <label for="agree">我已阅读并同意用户协议与隐私条款</label>
          </div>

          <button type="submit" class="login-btn">登录系统</button>
        </form>

        <p id="message" class="message"></p>

        <!-- 添加忘记密码和注册链接的容器 -->
        <div class="links-container">
          <div class="forgot-password-link">
            <p><a href="forgot-password.html">忘记密码？</a></p>
          </div>
          <div class="register-link">
            <p><a href="register.html">没有账号？去注册</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
