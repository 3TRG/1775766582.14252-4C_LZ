# 开发环境配置
# 继承基础配置并覆盖开发环境特定值

database:
  url: "sqlite:///./database_dev.db"
  echo: true  # 开发环境显示SQL语句

security:
  token_expire_hours: 24
  token_secret: "dev-secret-key-for-testing-only"
  master_key: "dev-master-key-for-testing-only"
  algorithm: "HS256"
  access_token_expire_minutes: 30

qke:
  default_backend: "local_simulator"
  default_key_length: 256
  default_decoy_count: 4
  session_timeout_minutes: 30
  max_participants: 10

server:
  host: "0.0.0.0"
  port: 8000
  debug: true  # 开发环境开启调试模式
  reload: true  # 开发环境启用自动重载
  workers: 1

logging:
  level: "DEBUG"  # 开发环境使用详细日志
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "./logs/app_dev.log"
  max_size_mb: 10
  backup_count: 5

environment: "development"
version: "1.0.0"