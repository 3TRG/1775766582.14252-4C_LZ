# 生产环境配置
# 继承基础配置并覆盖生产环境特定值

database:
  url: "postgresql://qkeviz:qkeviz123@db:5432/qkeviz"
  echo: false
  pool_size: 20
  max_overflow: 30
  pool_timeout: 60
  pool_recycle: 1800

security:
  token_expire_hours: 24
  token_secret: ""  # 必须通过环境变量设置
  master_key: ""    # 必须通过环境变量设置
  master_key_b64: "" # 必须通过环境变量设置
  algorithm: "HS256"
  access_token_expire_minutes: 30

qke:
  default_backend: "local_simulator"  # 生产环境可以考虑使用真实量子硬件后端
  default_key_length: 256
  default_decoy_count: 4
  session_timeout_minutes: 30
  max_participants: 50

server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  reload: false
  workers: 4

logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "./logs/app.log"
  max_size_mb: 100
  backup_count: 10

environment: "production"
version: "1.0.0"